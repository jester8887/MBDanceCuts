<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mix Previews</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; background: #f5f5f5; display: grid; place-items: center; min-height: 100vh; }
    .wrap { width: 100%; max-width: 720px; padding: 24px; text-align: center; }
    h1 { font-size: 20px; margin: 0 0 16px; }
    h2 { font-size: 16px; margin: 20px 0 8px; }
    audio { width: 100%; }
    .note { font-size: 12px; color: #666; margin-top: 8px; }
  </style>
</head>
<body oncontextmenu="return false">
  <div class="wrap">
    <h1>Mix Previews</h1>

    <h2>Tate McRae Mix</h2>
    <audio
      controls
      controlsList="nodownload noplaybackrate"
      preload="metadata"
      oncontextmenu="return false"
      disablepictureinpicture
    >
      <source src="https://www.dropbox.com/scl/fi/uww5h3uqjvorn4wkot7zn/Guess-Who-Mix.mp3?rlkey=tl7isyvpm9vrpw408p0i1voei&st=k31vdu6g&raw=1" type="audio/mpeg">
      Your browser does not support the audio element.
    </audio>

  </div>

</html>
