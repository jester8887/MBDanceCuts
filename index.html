<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="robots" content="noindex, nofollow">

  <title>Welcome</title>

  <script>
    function setCookie(name, value, days) {
      const expires = new Date(Date.now() + days * 86400000).toUTCString();
      document.cookie = name + "=" + value + "; expires=" + expires + "; path=/";
    }

    function getCookie(name) {
      return document.cookie
        .split("; ")
        .find(row => row.startsWith(name + "="))
        ?.split("=")[1];
    }

    const params = new URLSearchParams(window.location.search);
    const accessParam = params.get("access");

    // ✅ use RELATIVE path (fixes most break issues)
    const destination = "./new26mixes.html";

    if (accessParam === "dance") {
      setCookie("mb_access", "true", 30);
      window.location.replace(destination);
    }

    if (getCookie("mb_access") === "true") {
      window.location.replace(destination);
    }
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 500px;
      padding: 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.8;
      margin-bottom: 20px;
    }

    .cta {
      display: inline-block;
      padding: 12px 20px;
      background: #ffffff;
      color: #000;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
    }

    .cta:hover {
      opacity: 0.85;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Private Mix Library</h1>
    <p>
      This collection isn’t publicly listed.
      If you're looking for mixes for your dancers, I’ve got you covered.
    </p>

    <p>
      Send me a quick message and I’ll get you access.
    </p>

    <a class="cta" href="https://www.facebook.com/marcbeth" target="_blank">
      Message Me for Access
    </a>
  </div>
</body>
</html>
